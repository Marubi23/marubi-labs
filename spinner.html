<!-- spinner.html - The Vault Wheel Spinner -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marubi-Labs Vault Spinner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* VAULT WHEEL SPINNER */
        .vault-spinner {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .vault-spinner {
                width: 150px;
                height: 150px;
            }
        }

        /* Outer spinning ring */
        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(204, 47, 1, 0.2);
            border-top: 4px solid #cc2f01;
            border-right: 4px solid #e64d2e;
            animation: spinRing 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Middle spinning ring (reverse direction) */
        .spinner-ring-middle {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 3px solid rgba(204, 47, 1, 0.15);
            border-bottom: 3px solid #cc2f01;
            border-left: 3px solid #e64d2e;
            animation: spinRingReverse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Inner spinning ring */
        .spinner-ring-inner {
            position: absolute;
            width: 55%;
            height: 55%;
            border-radius: 50%;
            border: 3px solid rgba(204, 47, 1, 0.1);
            border-top: 3px solid #ff6b4a;
            border-right: 3px solid #cc2f01;
            animation: spinRing 1.2s ease-in-out infinite;
        }

        /* Center content - MARUBI-LABS text */
        .spinner-center {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 70%;
        }

        .spinner-logo {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: 800;
            font-family: 'Clash Display', sans-serif;
            background: linear-gradient(135deg, #cc2f01, #e64d2e, #ff6b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            animation: flicker 0.1s ease infinite;
            text-transform: uppercase;
        }

        .spinner-sub {
            font-size: clamp(0.6rem, 3vw, 0.7rem);
            color: rgba(204, 47, 1, 0.6);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0.3rem;
            letter-spacing: 2px;
        }

        /* Flicker animation for the text */
        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 5px rgba(204, 47, 1, 0.5); }
            25% { opacity: 0.7; text-shadow: 0 0 15px rgba(204, 47, 1, 0.8); }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(204, 47, 1, 0.5); }
            75% { opacity: 0.8; text-shadow: 0 0 10px rgba(204, 47, 1, 0.6); }
            100% { opacity: 1; text-shadow: 0 0 5px rgba(204, 47, 1, 0.5); }
        }

        /* Ring spinning animations */
        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinRingReverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* Glow effect behind spinner */
        .spinner-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(204, 47, 1, 0.15), transparent);
            border-radius: 50%;
            animation: glowPulse 2s ease infinite;
        }

        @keyframes glowPulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        /* Loading text below */
        .loading-text {
            margin-top: 2rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .loading-text span {
            color: #cc2f01;
            animation: blinkText 1s infinite;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div>
        <div class="vault-spinner">
            <div class="spinner-glow"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring-middle"></div>
            <div class="spinner-ring-inner"></div>
            <div class="spinner-center">
                <div class="spinner-logo">MARUBI-LABS</div>
                <div class="spinner-sub">// SECURE CONNECTION</div>
            </div>
        </div>
        <div class="loading-text">
            <span>⟳</span> INITIALIZING VAULT <span>⟳</span>
        </div>
    </div>
</body>
</html>
